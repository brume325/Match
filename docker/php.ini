; Match Moov — PHP config
upload_max_filesize = 10M
post_max_size       = 12M
memory_limit        = 256M
max_execution_time  = 60
date.timezone       = Europe/Paris
display_errors      = Off
log_errors          = On
error_log           = /var/log/apache2/php_errors.log
session.cookie_httponly = 1
session.cookie_samesite = Lax
